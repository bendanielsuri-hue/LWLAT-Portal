{% load static %}
{% load hub_extras %}
<nav class="side-nav hub-side expanded" data-hub="{{ hub_title|lower }}">
    <div class="nav-header">
        <div class="nav-top-row">
            <button type="button" class="switch-global nav-pill-btn" data-overlay-target="#global-nav-overlay">Change Hub</button>
            {% if back_to_hub_url %}
            <a href="{{ back_to_hub_url }}" class="exit-hub nav-pill-btn">{{ back_to_hub_label }}</a>
            {% endif %}
        </div>
        <div class="nav-title">{{ hub_title }}</div>
    </div>
    <ul class="nav-menu">
        {% for item in local_menu %}
            <li><a href="{{ item.url }}" class="{% active_menu_item request.path item local_menu %}"><span class="menu-icon">{% include item.icon %}</span><span class="menu-label">{{ item.name }}</span></a></li>
        {% endfor %}
    </ul>
    <div class="nav-footer">
        <button type="button" class="switch-school nav-pill-btn" data-overlay-target="#school-nav-overlay">
            <span class="school-current-label">{{ schools.0.name }}</span>
        </button>
        {% if inclusion_staff_list %}
        <select id="inclusion-who-am-i" class="nav-pill-select">
            <option value="">Select yourself…</option>
            {% for staff in inclusion_staff_list %}
            <option value="{{ staff.id }}">{{ staff.first_name }} {{ staff.last_name }}</option>
            {% endfor %}
        </select>
        {% endif %}
        <button type="button" class="nav-pill-btn settings-trigger" data-overlay-target="#settings-nav-overlay" aria-label="Settings">
            <span class="menu-icon">{% include 'icons/cog_svg.html' %}</span>
            <span class="menu-label">Settings</span>
        </button>
    </div>
</nav>
