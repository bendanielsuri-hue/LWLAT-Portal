<div class="settings-group">
    <span class="settings-label" id="pref-color-label">Primary colour</span>
    <div class="colour-grid" id="pref-color" role="radiogroup" aria-labelledby="pref-color-label">
        <button type="button" class="colour-swatch" data-value="purple" style="--swatch:#7c3aed;" title="Royal Purple" aria-label="Royal Purple"></button>
        <button type="button" class="colour-swatch" data-value="indigo" style="--swatch:#4338ca;" title="Midnight Indigo" aria-label="Midnight Indigo"></button>
        <button type="button" class="colour-swatch" data-value="blue" style="--swatch:#2563eb;" title="Ocean Blue" aria-label="Ocean Blue"></button>
        <button type="button" class="colour-swatch" data-value="teal" style="--swatch:#0d9488;" title="Deep Teal" aria-label="Deep Teal"></button>
        <button type="button" class="colour-swatch" data-value="green" style="--swatch:#16a34a;" title="Forest Green" aria-label="Forest Green"></button>
        <button type="button" class="colour-swatch" data-value="yellow" style="--swatch:#ca8a04;" title="Golden Yellow" aria-label="Golden Yellow"></button>
        <button type="button" class="colour-swatch" data-value="orange" style="--swatch:#ea580c;" title="Sunset Orange" aria-label="Sunset Orange"></button>
        <button type="button" class="colour-swatch" data-value="burnt" style="--swatch:#b3502f;" title="Burnt Red" aria-label="Burnt Red"></button>
        <button type="button" class="colour-swatch" data-value="red" style="--swatch:#dc2626;" title="Cherry Red" aria-label="Cherry Red"></button>
        <button type="button" class="colour-swatch" data-value="pink" style="--swatch:#db2777;" title="Blossom Pink" aria-label="Blossom Pink"></button>
    </div>
    <p class="settings-current" id="pref-color-current"></p>
</div>

<div class="settings-group">
    <span class="settings-label" id="pref-theme-label">Theme</span>
    <button type="button" class="theme-toggle" id="pref-theme" role="switch" aria-checked="false" aria-labelledby="pref-theme-label">
        <span class="theme-toggle-icon theme-toggle-sun">{% include 'icons/sun_svg.html' %}</span>
        <span class="theme-toggle-thumb"></span>
        <span class="theme-toggle-icon theme-toggle-moon">{% include 'icons/moon_svg.html' %}</span>
    </button>
</div>

<div class="settings-group">
    <span class="settings-label" id="pref-text-size-label">Text size</span>
    <div class="text-size-grid" id="pref-text-size" role="radiogroup" aria-labelledby="pref-text-size-label">
        <button type="button" class="text-size-option" data-value="sm">
            <span class="size-preview" style="font-size: 14px;">Aa</span>
            <span class="size-name">Small</span>
        </button>
        <button type="button" class="text-size-option" data-value="md">
            <span class="size-preview" style="font-size: 16px;">Aa</span>
            <span class="size-name">Default</span>
        </button>
        <button type="button" class="text-size-option" data-value="lg">
            <span class="size-preview" style="font-size: 18px;">Aa</span>
            <span class="size-name">Large</span>
        </button>
        <button type="button" class="text-size-option" data-value="xl">
            <span class="size-preview" style="font-size: 20px;">Aa</span>
            <span class="size-name">X-Large</span>
        </button>
        <button type="button" class="text-size-option" data-value="xxl">
            <span class="size-preview" style="font-size: 22px;">Aa</span>
            <span class="size-name">XX-Large</span>
        </button>
    </div>
</div>
