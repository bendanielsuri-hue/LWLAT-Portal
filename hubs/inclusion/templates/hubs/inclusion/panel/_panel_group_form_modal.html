<div class="modal-header">
    <h2>Create Panel Group</h2>
</div>
<div class="modal-body">
    <form method="post" action="{% url 'inclusion_panel_group_new' %}" class="field-group" data-panel-group-modal-form>
        {% csrf_token %}
        <label>Name</label>
        <input type="text" name="name" required>

        <label>School</label>
        <select name="school">
            <option value="">No school</option>
            {% for school in schools %}
            <option value="{{ school.id }}" {% if preselect_school_id == school.id|stringformat:'s' %}selected{% endif %}>{{ school.name }}</option>
            {% endfor %}
        </select>

        <h3>Initial Members</h3>
        <div data-member-rows>
            {% for i in "123" %}
            <div class="panel-group-member-row">
                <select name="member_staff">
                    <option value="">— none —</option>
                    {% for staff in staff_list %}
                    <option value="{{ staff.id }}">{{ staff.first_name }} {{ staff.last_name }}</option>
                    {% endfor %}
                </select>
                <select name="member_expertise">
                    <option value="">No expertise tag</option>
                    {% for e in expertise_list %}
                    <option value="{{ e.id }}">{{ e.name }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endfor %}
        </div>
        <button type="button" class="btn btn-sm" data-add-member-row>+ Add another member</button>

        <div class="btn-row">
            <button type="button" class="btn btn-sm" data-modal-close>Cancel</button>
            <button type="submit" class="btn btn-add btn-sm">Create Group</button>
        </div>
    </form>
</div>
