<span class="ui-fused-field">
    <label class="ui-fused-field-label" for="{{ field_id }}">Panel Group</label>
    <select id="{{ field_id }}" name="panel_group" {% if form_id %}form="{{ form_id }}"{% endif %} required data-current-staff-school="{{ current_staff.school_id|default:'' }}">
        {% if show_placeholder %}<option value="">Select a group…</option>{% endif %}
        {% for group in panel_groups %}
        <option value="{{ group.id }}" data-school="{{ group.school_id|default:'' }}" data-school-name="{{ group.school.name|default:'' }}" data-default-chair="{{ group.default_chair_id|default:'' }}" {% if group.id == selected_group_id %}selected{% endif %}>{{ group.name }}{% if not group.school_id %} (No school){% endif %}</option>
        {% endfor %}
    </select>
    <button type="button" class="ui-fused-field-add ui-add-group-btn btn btn-add btn-sm" data-add-trigger="panel-group" aria-label="Create new Panel Group"><span class="btn-icon">{% include 'icons/new_svg.html' %}</span></button>
</span>
