<div class="agenda-order-controls">
    <div class="agenda-order-arrows">
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="form_action" value="move_agenda_referral">
            <input type="hidden" name="panel_referral_id" value="{{ pr.id }}">
            <input type="hidden" name="direction" value="up">
            <button type="submit" class="agenda-order-arrow-btn" {% if forloop.first %}disabled{% endif %} aria-label="Move up in agenda order">{% include 'icons/arrow_up_svg.html' %}</button>
        </form>
        <span class="agenda-order-number">{{ forloop.counter }}</span>
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="form_action" value="move_agenda_referral">
            <input type="hidden" name="panel_referral_id" value="{{ pr.id }}">
            <input type="hidden" name="direction" value="down">
            <button type="submit" class="agenda-order-arrow-btn" {% if forloop.last %}disabled{% endif %} aria-label="Move down in agenda order">{% include 'icons/arrow_down_svg.html' %}</button>
        </form>
    </div>
</div>
