<form method="post" class="priority-mini-form">
    {% csrf_token %}
    <input type="hidden" name="form_action" value="update_priority">
    <input type="hidden" name="referral_id" value="{{ ref.id }}">
    <select name="priority" class="priority-select ui-select--center" aria-label="Priority" onchange="this.form.requestSubmit()">
        <option value="" {% if not ref.priority %}selected{% endif %}>Set Priority</option>
        {% for value, label in priority_choices %}
        <option value="{{ value }}" {% if ref.priority == value %}selected{% endif %}>{{ label }} Priority</option>
        {% endfor %}
    </select>
</form>
